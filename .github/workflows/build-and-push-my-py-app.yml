name: Build and Push my-py-app

on:
  push:
    branches:
      - master
    paths:
      - my-py-app/**
      - .github/workflows/build-and-push-my-py-app.yml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: alexk8s-test-proj
  REGION: europe-north2
  ARTIFACT_REGISTRY_REPOSITORY: application-images
  IMAGE_NAME: my-py-app
  GCP_WORKLOAD_IDENTITY_PROVIDER: projects/615822691944/locations/global/workloadIdentityPools/github/providers/github
  GCP_SERVICE_ACCOUNT: artifacts-ci-builder@alexk8s-test-proj.iam.gserviceaccount.com

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Log in to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push image
        env:
          IMAGE_URI: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPOSITORY }}/${{ env.IMAGE_NAME }}
        run: |
          docker build -f my-py-app/Dockerfile -t "$IMAGE_URI:${GITHUB_SHA}" -t "$IMAGE_URI:latest" my-py-app
          docker push "$IMAGE_URI:${GITHUB_SHA}"
          docker push "$IMAGE_URI:latest"