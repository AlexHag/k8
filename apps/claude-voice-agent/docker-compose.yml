services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: agent-m-user
      POSTGRES_PASSWORD: agent-m-password
      POSTGRES_DB: agentm
    ports:
      - "5432:5432"
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - DB_TYPE=postgres
      - DATABASE_URL=postgresql://agent-m-user:agent-m-password@postgres:5432/agentm
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - postgres
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
