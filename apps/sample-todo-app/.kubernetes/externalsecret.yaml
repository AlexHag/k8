apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: sample-todo-app-db
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: ClusterSecretStore
  target:
    name: sample-todo-app-db
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: sample-todo-app-db-password
