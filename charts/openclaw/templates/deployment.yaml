apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openclaw.fullname" . }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: {{ .Values.strategy }}
  selector:
    matchLabels:
      {{- include "openclaw.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "openclaw.labels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: init-config
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Values.openclawVersion }}"
          command:
            - sh
            - -c
            - |
              log() { echo "[$(date -Iseconds)] [init-config] $*"; }

              log "Starting config initialization"
              mkdir -p /home/node/.openclaw
              CONFIG_MODE="${CONFIG_MODE:-merge}"

              if [ "$CONFIG_MODE" = "merge" ] && [ -f /home/node/.openclaw/openclaw.json ]; then
                log "Mode: merge - merging Helm config with existing config"
                if node -e "
                  const fs = require('fs');
                  const stripComments = (s) => {
                    let r = '', q = false, i = 0;
                    while (i < s.length) {
                      if (q) {
                        if (s[i] === '\\\\') { r += s[i] + s[i+1]; i += 2; continue; }
                        if (s[i] === '\"') q = false;
                        r += s[i++];
                      } else if (s[i] === '\"') {
                        q = true; r += s[i++];
                      } else if (s[i] === '/' && s[i+1] === '/') {
                        while (i < s.length && s[i] !== '\n') i++;
                      } else { r += s[i++]; }
                    }
                    return r;
                  };
                  let existing;
                  try {
                    existing = JSON.parse(stripComments(fs.readFileSync('/home/node/.openclaw/openclaw.json', 'utf8')));
                  } catch (e) {
                    console.error('[init-config] Warning: existing config is not valid JSON, will overwrite');
                    process.exit(1);
                  }
                  const helm = JSON.parse(stripComments(fs.readFileSync('/config/openclaw.json', 'utf8')));
                  const deepMerge = (target, source) => {
                    for (const key of Object.keys(source)) {
                      if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key])) {
                        target[key] = target[key] || {};
                        deepMerge(target[key], source[key]);
                      } else {
                        target[key] = source[key];
                      }
                    }
                    return target;
                  };
                  const merged = deepMerge(existing, helm);
                  fs.writeFileSync('/home/node/.openclaw/openclaw.json', JSON.stringify(merged, null, 2));
                "; then
                  log "Config merged successfully"
                else
                  log "WARNING: Merge failed (existing config may not be valid JSON), falling back to overwrite"
                  cp /config/openclaw.json /home/node/.openclaw/openclaw.json
                fi
              else
                if [ ! -f /home/node/.openclaw/openclaw.json ]; then
                  log "Fresh install - writing initial config"
                else
                  log "Mode: overwrite - replacing config with Helm values"
                fi
                cp /config/openclaw.json /home/node/.openclaw/openclaw.json
              fi
              log "Config initialization complete"
          env:
            - name: CONFIG_MODE
              value: {{ .Values.configMode | default "merge" | quote }}
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: data
              mountPath: /home/node/.openclaw
            - name: tmp
              mountPath: /tmp
        - name: init-skills
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Values.openclawVersion }}"
          command:
            - sh
            - -c
            - |
              log() { echo "[$(date -Iseconds)] [init-skills] $*"; }

              log "Starting skills initialization"

              # ============================================================
              # Runtime Dependencies
              # ============================================================
              # Some skills require additional runtimes (Python, Go, etc.)
              # Install them here so they persist across pod restarts.
              #
              # Example: Install uv (Python package manager) for Python skills
              # mkdir -p /home/node/.openclaw/bin
              # if [ ! -f /home/node/.openclaw/bin/uv ]; then
              #   log "Installing uv..."
              #   curl -LsSf https://astral.sh/uv/install.sh | env UV_INSTALL_DIR=/home/node/.openclaw/bin sh
              # fi
              #
              # Example: Install pnpm and packages for interfaces (e.g., MS Teams)
              # PNPM_HOME=/home/node/.openclaw/pnpm
              # mkdir -p "$PNPM_HOME"
              # if [ ! -f "$PNPM_HOME/pnpm" ]; then
              #   log "Installing pnpm..."
              #   curl -fsSL https://get.pnpm.io/install.sh | env PNPM_HOME="$PNPM_HOME" SHELL=/bin/sh sh -
              # fi
              # export PATH="$PNPM_HOME:$PATH"
              # log "Installing interface dependencies..."
              # cd /home/node/.openclaw
              # pnpm install <your-package> --store-dir /home/node/.openclaw/.pnpm-store

              # ============================================================
              # Skill Installation
              # ============================================================
              # Install skills from ClawHub (https://clawhub.com)
              # Add skill slugs to the list below to install them declaratively.
              mkdir -p /home/node/.openclaw/workspace/skills
              cd /home/node/.openclaw/workspace
              install_skill() {
                skill="$1"
                SKILL_NAME="$(basename "$skill")"
                if [ -z "$skill" ]; then
                  return 0
                fi
                if [ -d "skills/$SKILL_NAME" ]; then
                  log "Skill already installed: $skill"
                  return 0
                fi
                log "Installing skill: $skill"
                attempts=6
                delay=5
                for i in $(seq 1 "$attempts"); do
                  if npx -y clawhub install "$skill" --no-input; then
                    log "Installed skill: $skill"
                    return 0
                  fi
                  jitter=$((RANDOM % 5))
                  if [ "$i" -lt "$attempts" ]; then
                    log "WARNING: Failed to install skill: $skill (attempt $i/$attempts). Retrying in $((delay + jitter))s..."
                    sleep $((delay + jitter))
                    delay=$((delay * 2))
                  fi
                done
                log "WARNING: Failed to install skill after $attempts attempts: $skill"
                return 1
              }
              for skill in weather gog; do
                install_skill "$skill" || true
              done
              log "Skills initialization complete"
          env:
            - name: HOME
              value: /tmp
            - name: NPM_CONFIG_CACHE
              value: /tmp/.npm
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /home/node/.openclaw
            - name: tmp
              mountPath: /tmp
      containers:
        - name: main
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Values.openclawVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - node
            - dist/index.js
          args:
            - gateway
            - --bind
            - lan
            - --port
            - "{{ .Values.service.port }}"
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.env }}
          env:
            {{- range $key, $value := . }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          volumeMounts:
            - name: bash-aliases
              mountPath: /home/node/.bash_aliases
              subPath: bash_aliases
              readOnly: true
            - name: data
              mountPath: /home/node/.openclaw
            - name: tmp
              mountPath: /tmp
        {{- if .Values.chromium.enabled }}
        - name: chromium
          image: "{{ .Values.chromium.image.repository }}:{{ .Values.chromium.image.tag | default .Values.chromiumVersion }}"
          env:
            - name: XDG_CACHE_HOME
              value: /tmp
          ports:
            - name: cdp
              containerPort: 9222
              protocol: TCP
          securityContext:
            {{- toYaml .Values.chromium.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.chromium.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /json/version
              port: cdp
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /json/version
              port: cdp
            initialDelaySeconds: 5
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /json/version
              port: cdp
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 12
          volumeMounts:
            - name: tmp
              mountPath: /tmp
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "openclaw.fullname" . }}
        - name: bash-aliases
          configMap:
            name: {{ include "openclaw.fullname" . }}
            items:
              - key: bash_aliases
                path: bash_aliases
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (include "openclaw.fullname" .) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
