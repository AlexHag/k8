# OpenClaw Helm Chart Values
#
# IMPORTANT ARCHITECTURE NOTES:
# - OpenClaw is NOT horizontally scalable
# - Deploy as a SINGLE INSTANCE only
# - Do NOT increase replica count

# -- Override the chart name
nameOverride: "openclaw"
# -- Override the full resource name
fullnameOverride: "openclaw"

# -- OpenClaw image version (used by all OpenClaw containers)
openclawVersion: "2026.3.2"
# -- Chromium sidecar image version
chromiumVersion: "146.0.7680.31"
# -- Config mode: `merge` preserves runtime changes, `overwrite` for strict GitOps
configMode: merge

# -- Number of replicas (must be 1, OpenClaw doesn't support horizontal scaling)
replicaCount: 1
# -- Deployment strategy
strategy: Recreate

# -- Main OpenClaw container image
image:
  repository: ghcr.io/openclaw/openclaw
  # -- Defaults to openclawVersion if not set
  tag: ""
  pullPolicy: IfNotPresent

# -- Pod security context
podSecurityContext:
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch

# -- Main container security context
securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# -- Main container resource requests and limits
resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

# -- Injects the ExternalSecret-managed secret as environment variables
envFrom:
  - secretRef:
      name: openclaw-env

# Extra environment variables for the main container
# Example:
#   PATH: /home/node/.openclaw/pnpm:/home/node/.openclaw/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
#   PNPM_HOME: /home/node/.openclaw/pnpm
env: {}

# -- Chromium sidecar for browser automation (CDP on port 9222)
chromium:
  # -- Enable/disable the Chromium browser sidecar
  enabled: true
  image:
    repository: chromedp/headless-shell
    # -- Defaults to chromiumVersion if not set
    tag: ""
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    runAsNonRoot: true
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# -- Service configuration
service:
  type: ClusterIP
  port: 18789
  ipFamilyPolicy: SingleStack
  ipFamilies:
    - IPv4

# -- OpenClaw configuration files
config:
  # -- Shell alias for interactive sessions (sourced by ~/.bashrc)
  bashAliases: |
    alias openclaw='node /app/dist/index.js'
  # -- OpenClaw configuration - JSON5 format
  # Sensitive values use ${ENV_VAR} substitution from environment secret
  openclawJson: |
    {
      // Gateway configuration
      "gateway": {
        "port": 18789,
        "mode": "local",
        // IMPORTANT: trustedProxies uses exact IP matching only
        // - CIDR notation is NOT supported - list each proxy IP individually
        // - IPv6 exact addresses may work but are untested
        // - Recommend single-stack IPv4 deployments for simplicity
        "trustedProxies": ["10.0.0.1"]
      },

      // Browser configuration (Chromium sidecar)
      "browser": {
        "enabled": true,
        "defaultProfile": "default",
        "profiles": {
          "default": {
            "cdpUrl": "http://localhost:9222",
            "color": "#4285F4"
          }
        }
      },

      // Agent configuration
      "agents": {
        "defaults": {
          "workspace": "/home/node/.openclaw/workspace",
          "model": {
            // Uses ANTHROPIC_API_KEY from environment
            "primary": "anthropic/claude-opus-4-6"
          },
          "userTimezone": "UTC",
          "timeoutSeconds": 600,
          "maxConcurrent": 1
        },
        "list": [
          {
            "id": "main",
            "default": true,
            "identity": {
              "name": "OpenClaw",
              "emoji": "🦞"
            }
          }
        ]
      },

      // Session management
      "session": {
        "scope": "per-sender",
        "store": "/home/node/.openclaw/sessions",
        "reset": {
          "mode": "idle",
          "idleMinutes": 60
        }
      },

      // Logging
      "logging": {
        "level": "info",
        "consoleLevel": "info",
        "consoleStyle": "compact",
        "redactSensitive": "tools"
      },

      // Tools configuration
      "tools": {
        "profile": "full",
        "web": {
          "search": {
            "enabled": false
          },
          "fetch": {
            "enabled": true
          }
        }
      }

      // Channel configuration can be added here:
      // "channels": {
      //   "telegram": {
      //     "botToken": "${TELEGRAM_BOT_TOKEN}",
      //     "enabled": true
      //   },
      //   "discord": {
      //     "token": "${DISCORD_BOT_TOKEN}"
      //   },
      //   "slack": {
      //     "botToken": "${SLACK_BOT_TOKEN}",
      //     "appToken": "${SLACK_APP_TOKEN}"
      //   }
      // }
    }

# -- Persistence for OpenClaw data directory
persistence:
  enabled: true
  accessMode: ReadWriteOnce
  size: 5Gi
  # -- Specify an existing PVC to use
  # existingClaim: ""
  # -- Storage class (leave empty for default)
  # storageClass: ""

# -- HTTPRoute configuration (Gateway API / Envoy Gateway)
httpRoute:
  enabled: true
  gatewayRef:
    name: envoy-gateway
    namespace: envoy-gateway-system
    sectionName: https
  hostnames:
    - openclaw.patchdb.se
  # filters:
  #   - type: RequestHeaderModifier
  #     requestHeaderModifier:
  #       set:
  #         - name: X-Forwarded-Proto
  #           value: https

# -- ExternalSecret pulls secrets from Google Secret Manager via the ClusterSecretStore
externalSecret:
  enabled: true
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: ClusterSecretStore
  data:
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: openai-api-key
